<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results Viewer</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f6f1ec;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 15px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.section-header {
  position: sticky;
  top: 0;
  background: #e9ded6;
  padding: 10px;
  font-weight: bold;
  border-radius: 8px;
  margin-top: 20px;
  z-index: 5;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 12px;
  margin: 8px 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.label {
  font-weight: bold;
  color: #7a4c2f;
}

.footer-note {
  text-align: center;
  margin-top: 30px;
  font-size: 0.85rem;
  color: #8c7a6b;
}

.footer-credit {
  display: block;
  font-size: 0.75rem;
  margin-top: 5px;
}

.footer-credit a {
  color: inherit;
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
  <h1>Festival Results</h1>

  <input type="text" id="searchBox" placeholder="Search by name, church, category..." />

  <div id="results"></div>

  <div class="footer-note">
    Mobile-friendly event results viewer<br>
    <span class="footer-credit">
      Developed by Gen Tindall • Licensed for use • 
      <a href="mailto:designs@ctgraphic.net">Contact for use</a>
    </span>
  </div>
</div>

<script>
let allData = [];

function cleanText(value) {
  return String(value || "")
    .replace(/�/g, "'")
    .replace(/’/g, "'")
    .trim();
}

function normalize(value) {
  return cleanText(value).toLowerCase();
}

fetch("results.csv")
  .then(res => res.text())
  .then(text => {
    const rows = text.split("\n").slice(1);
    allData = rows.map(r => {
      const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      return {
        name: cleanText(cols[1]),
        category: cleanText(cols[2]),
        score: cleanText(cols[4]),
        rating: cleanText(cols[5]),
        church: cleanText(cols[6]),
        city: cleanText(cols[7])
      };
    });

    displayResults();
  });

document.getElementById("searchBox").addEventListener("input", displayResults);

function displayResults() {
  const search = normalize(searchBox.value);

  let filtered = allData.filter(row => {
    return !search ||
      normalize(row.name).includes(search) ||
      normalize(row.category).includes(search) ||
      normalize(row.church).includes(search);
  });

  // sort by church FIRST
  filtered.sort((a, b) => a.church.localeCompare(b.church));

  const container = document.getElementById("results");
  container.innerHTML = "";

  let currentChurch = "";

  filtered.forEach(row => {
    if (row.church !== currentChurch) {
      currentChurch = row.church;

      const header = document.createElement("div");
      header.className = "section-header";
      header.textContent = currentChurch;
      container.appendChild(header);
    }

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div><span class="label">Name:</span> ${row.name}</div>
      <div><span class="label">Category:</span> ${row.category}</div>
      <div><span class="label">Score:</span> ${row.score}</div>
      <div><span class="label">Rating:</span> ${row.rating}</div>
      <div><span class="label">Church:</span> ${row.church} (${row.city})</div>
    `;

    container.appendChild(card);
  });
}
</script>

</body>
</html>
